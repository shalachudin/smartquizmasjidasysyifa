<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Quiz Masjid Asy-Syifa</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="module" data-type="overview">
        // --- JANGAN DIHAPUS: UNTUK BABEL ---
    </script>

    <script type="text/babel" data-presets="react">
        // Import Firebase
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, collection, getDocs, runTransaction } from "firebase/firestore";

        // MASUKKAN DATA ASLI DARI FIREBASE CONSOLE DI SINI
        const firebaseConfig = {
            apiKey: "PASTE_API_KEY_ASLI_DI_SINI",
            authDomain: "smart-quiz-asy-syifa.firebaseapp.com",
            projectId: "smart-quiz-asy-syifa",
            storageBucket: "smart-quiz-asy-syifa.appspot.com",
            messagingSenderId: "PASTE_SENDER_ID_ASLI_DI_SINI",
            appId: "PASTE_APP_ID_ASLI_DI_SINI"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "smart-quiz-pai-001";

        // Bank Soal PAI (Contoh)
        const QUESTION_BANK = [
            { id: 1, category: "Aqidah", vignette: "Ahmad melihat pelangi...", question: "Sifat Allah adalah...", options: ["Al-Khaliq", "Al-Bashir", "As-Sami", "Al-Ahad"], correct: 0, timeLimit: 45 }
        ];

        function App() {
            const [role, setRole] = React.useState(null);
            const [playerName, setPlayerName] = React.useState('');
            
            // Logika kuis sederhana untuk mengetes
            if (!role) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-emerald-50">
                        <h1 className="text-3xl font-bold mb-8 text-emerald-800">Smart Quiz PAI</h1>
                        <div className="space-y-4 w-full max-w-xs">
                            <button onClick={() => setRole('server')} className="w-full p-4 bg-emerald-600 text-white rounded-xl font-bold">MODE SERVER</button>
                            <button onClick={() => setRole('participant')} className="w-full p-4 bg-amber-500 text-white rounded-xl font-bold">MODE PESERTA</button>
                        </div>
                    </div>
                );
            }

            return <div className="p-10 text-center">Berhasil Masuk sebagai {role}!</div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
